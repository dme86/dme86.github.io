<span class="post-date js-post-meta">
  {{ include.date | date_to_string }} |
  <span class="js-word-count"{% if include.word_id %} id="{{ include.word_id }}"{% endif %}>{{ include.fallback_words | default: 0 }}</span> words
  <span class="post-code-metric js-code-metric" hidden><span class="js-loc-count">0</span> LoC</span>
  &middot; <span class="post-read-time js-read-time">{{ include.fallback_read_time | default: 1 }}</span> min read
</span>
