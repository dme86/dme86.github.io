<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  {% include mermaid.html %}

  <body>

    {% include sidebar.html %}

    <div class="masthead">
      <div class="container masthead-content">
        <div class="masthead-brand">
          <h3 class="masthead-title">
            <a href="{{ site.baseurl }}/" title="Home">Daniel Meier</a>
          </h3>
          <small class="masthead-tagline">Infrastructure, Linux, automation, and operational engineering</small>
        </div>

        <nav class="masthead-nav" aria-label="Primary">
          <a href="{{ '/search/' | absolute_url }}">Search</a>
          <a href="{{ '/topics/' | absolute_url }}">Topics</a>
          <a href="{{ '/about/' | absolute_url }}">About</a>
          <a href="https://www.linkedin.com/in/dmeier86/" rel="me">LinkedIn</a>
        </nav>
      </div>
    </div>

    <!-- Wrap is the content to shift when toggling the sidebar. We wrap the
         content to avoid any CSS collisions with our real content. -->
    <div class="wrap">
      <div class="container content">
        {{ content }}
      </div>
    </div>

    <label for="sidebar-checkbox" class="sidebar-toggle"></label>
    <button class="scroll-top" id="scroll-top" type="button" aria-label="Scroll to top">
      <span class="scroll-top-label">Top</span>
      <span class="scroll-top-progress" id="scroll-top-progress" aria-hidden="true"></span>
    </button>

    <script src='{{ site.baseurl }}/public/js/script.js'></script>
  </body>
</html>
